name = "potato"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]
account_id = "0e528c886015cce349076fb7db222a88"

# Environment variables
[vars]
APP_NAME = "Spud Buds Cookbook"
PREMIUM_PRICE_ID = "price_premium_yearly"

# Secrets (set via `wrangler secret put`):
# - JWT_SECRET: For signing auth tokens
# - STRIPE_SECRET_KEY: Stripe API key
# - STRIPE_WEBHOOK_SECRET: Stripe webhook signing secret
# - UNSPLASH_ACCESS_KEY: For recipe images (get from https://unsplash.com/developers)

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "spud-buds-db"
database_id = "4e63889c-b9f0-4936-85b1-0a0fc84aaa0b"

# R2 Bucket for images
[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "spud-buds-images"

# KV for caching
[[kv_namespaces]]
binding = "CACHE"
id = "81635b4052c74b79bae399711d49e401"

# Queue for async tasks (producer only for now)
[[queues.producers]]
binding = "TASK_QUEUE"
queue = "spud-buds-tasks"
